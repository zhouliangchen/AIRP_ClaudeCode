<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Claude Code RP</title>
<script src="lib/jquery-3.5.1.min.js"></script>
<script src="lib/lodash-4.17.21.min.js"></script>
<link rel="stylesheet" href="lib/toastr-2.1.4.min.css">
<script src="lib/toastr-2.1.4.min.js"></script>
<script src="_regex_engine.js"></script>
<style>
:root {
  --bg: #f5f0e8;
  --surface: #ede6d8;
  --border: #d4c9b0;
  --accent: #b06a3d;
  --accent2: #5a7a5a;
  --text: #3a3028;
  --muted: #8a7a65;
  --input-bg: #fdfaf4;
  --font-ui: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
  --font-display: 'STKaiti', 'SimSun', serif;
  --font-body: 'SimSun', '宋体', serif;
  --ink: #3a3028;
  --line: #d4c9b0;
  --soft: #ede6d8;
  --radius-md: 12px;
  --radius-sm: 8px;
  --radius-full: 999px;
  --color-ember: #d97706;
}
[data-theme="dark"] {
  --bg: #1b1b26;
  --surface: #24242f;
  --border: #3a3a50;
  --accent: #d4946a;
  --accent2: #7aaa7a;
  --text: #d4c5b9;
  --muted: #9a9aac;
  --input-bg: #1e1e2a;
  --ink: #d4c5b9;
  --line: #3a3a50;
  --soft: #24242f;
  --color-ember: #f59e0b;
}
* { margin:0; padding:0; box-sizing:border-box; }
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #c4b9a0; border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: #a89880; }
[data-theme="dark"] ::-webkit-scrollbar-thumb { background: #4a4a60; }
[data-theme="dark"] ::-webkit-scrollbar-thumb:hover { background: #5a5a75; }
html, body {
  height: 100vh; overflow: hidden;
  background: var(--bg); color: var(--text);
  font-family: var(--font-ui);
}
body {
  display: flex; flex-direction: column;
  transition: none;
}

/* ═══ TOP BAR ═══ */
#topbar {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 6px 16px;
  display: flex; align-items: center; gap: 12px;
  font-size: 0.82em; flex-shrink: 0; min-height: 34px;
}
#topbar .dot { width: 7px; height: 7px; border-radius: 50%; }
#topbar .dot.green { background: #7b9c6e; }
#topbar .dot.yellow { background: #cc9a56; }
#topbar .dot.red { background: #b0624a; }
#topbar .tag {
  background: var(--accent); color: #fff;
  padding: 1px 10px; border-radius: 10px;
  font-size: 0.8em; font-weight: 600; white-space: nowrap;
}
#topbar .sep { color: var(--border); }
#topbar .dim { color: var(--muted); }
#topbar .spacer { flex: 1; }
#reply-progress {
  display: none;
  min-width: 190px;
  max-width: 260px;
  color: var(--muted);
  font-size: 0.78em;
}
#reply-progress.show { display: block; }
#reply-progress summary {
  display: flex;
  align-items: center;
  gap: 7px;
  cursor: pointer;
  list-style: none;
}
#reply-progress summary::-webkit-details-marker { display: none; }
#reply-progress-detail {
  display: block;
  margin-top: 3px;
  max-width: 260px;
  color: var(--muted);
  font-size: 0.72em;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
#reply-progress-bar {
  width: 92px;
  height: 5px;
  background: var(--border);
  border-radius: 999px;
  overflow: hidden;
  flex-shrink: 0;
}
#reply-progress-fill {
  width: 0%;
  height: 100%;
  background: var(--accent2);
  border-radius: 999px;
  transition: width 0.25s ease;
}
#reply-progress.indeterminate #reply-progress-fill {
  width: 45%;
  animation: progress-slide 1.2s ease-in-out infinite;
}
@keyframes progress-slide {
  0% { transform: translateX(-110%); }
  100% { transform: translateX(240%); }
}
#mobile-settings-toggle {
  display: none;
  width: 28px;
  height: 26px;
  align-items: center;
  justify-content: center;
  background: var(--input-bg);
  color: var(--text);
  border: 1px solid var(--border);
  border-radius: 6px;
  cursor: pointer;
  font-size: 1em;
  line-height: 1;
}
#mobile-settings-toggle.is-open {
  background: var(--accent2);
  border-color: var(--accent2);
  color: #fff;
}
#mobile-settings-backdrop,
#mobile-actions-card {
  display: none;
}

/* ═══ MAIN ═══ */
#main {
  display: flex; flex: 1; overflow: hidden;
}

/* ═══ CONTENT ═══ */
#content-panel {
  flex: 1; overflow-y: auto; padding: 20px 24px;
  display: flex; flex-direction: column; align-items: center;
  scroll-behavior: smooth;
  background: linear-gradient(180deg, #faf7f0 0%, #f5f0e8 100%);
}
[data-theme="dark"] #content-panel {
  background: linear-gradient(180deg, #1e1e2a 0%, #1b1b26 100%);
}
#content-panel #doc { width: 100%; max-width: 860px; }
#content-panel #doc > * {
  border-radius: 6px;
  box-shadow: 0 1px 6px rgba(0,0,0,.06), 0 0 1px rgba(0,0,0,.04);
}

/* ═══ TURN DISPLAY ═══ */
.turn-wrap { margin-bottom: 22px; }
.turn-role {
  font-size: 0.7em; font-weight: 700; text-transform: uppercase;
  letter-spacing: 2.5px; margin-bottom: 5px; padding-left: 2px;
}
.turn-user .turn-role { color: var(--accent); }
.turn-ai .turn-role { color: var(--accent2); }
.turn-user .turn-text {
  background: var(--surface);
  border-left: 3px solid var(--accent);
  padding: 12px 16px; border-radius: 0 6px 6px 0;
  font-size: 0.88em; color: var(--muted);
  line-height: 1.7;
}
.turn-ai .turn-text {
  padding: 4px 0; line-height: 1.9;
}
.turn-ai .turn-text content {
  display: block;
}
.character-dialogues {
  display: grid;
  gap: 8px;
  margin: 8px 0 12px;
}
.character-dialogue-card {
  position: relative;
  padding: 10px 13px;
  background: var(--input-bg);
  border: 1px solid var(--border);
  border-left: 3px solid var(--accent2);
  border-radius: 8px;
  box-shadow: 0 1px 4px rgba(0,0,0,.05);
}
.character-dialogue-name {
  font-size: 0.72em;
  font-weight: 700;
  letter-spacing: 0.08em;
  color: var(--accent2);
  margin-bottom: 4px;
}
.character-dialogue-line {
  font-size: 0.92em;
  line-height: 1.65;
  color: var(--text);
}
.character-dialogue-aside {
  margin-top: 5px;
  font-size: 0.78em;
  line-height: 1.55;
  color: var(--muted);
}
.turn-pending {
  opacity: 0.86;
}
.turn-pending-ai .turn-text {
  color: var(--muted);
  font-style: italic;
}
.pending-reply {
  margin: 0;
}

/* ═══ SIDEBAR ═══ */
#sidebar {
  width: 300px; flex-shrink: 0;
  background: var(--surface);
  border-left: 1px solid var(--border);
  overflow-y: auto; padding: 12px;
  display: flex; flex-direction: column; gap: 8px;
  font-size: 0.82em;
}
#mobile-settings-drawer {
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.side-card {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 8px; padding: 10px 12px;
}
.side-card h4 {
  font-size: 0.82em; color: var(--accent); margin-bottom: 6px;
  text-transform: uppercase; letter-spacing: 1px; font-weight: 600;
}
.side-card .kv { display: flex; justify-content: space-between; padding: 2px 0; }
.side-card .kv .k { color: var(--muted); }
.stat-bar-wrap { background: var(--border); border-radius: 3px; height: 5px; margin: 2px 0 6px; }
.stat-bar { height: 100%; border-radius: 3px; transition: width 0.5s ease; }
.stat-hp { background: #b0624a; }
.stat-mp { background: #5a8a9a; }
.stat-exp { background: #cc9a56; }
.chip {
  display: inline-block; padding: 2px 8px; border-radius: 10px;
  font-size: 0.78em; margin: 2px 3px; cursor: default;
}
.chip-hot { background: var(--accent); color: #fff; }
.chip-normal { background: var(--border); color: var(--muted); }
/* clickable action chips */
.chip-action {
  display: inline-block; padding: 4px 10px; border-radius: 12px;
  font-size: 0.78em; margin: 3px 4px; cursor: pointer;
  background: var(--input-bg); color: var(--text);
  border: 1px solid var(--border);
  transition: background 0.15s, border-color 0.15s;
}
.chip-action:hover { background: #ede6d8; border-color: var(--accent); }
.chip-action:active { background: var(--accent); color: #fff; }
.summary-text { color: var(--muted); font-size: 0.82em; line-height: 1.55; }
/* settings controls */
.setting-row { display: flex; justify-content: space-between; align-items: center; padding: 3px 0; }
.setting-row .label { font-size: 0.8em; color: var(--muted); }
.setting-row select {
  background: var(--input-bg); color: var(--text); border: 1px solid var(--border);
  border-radius: 4px; padding: 2px 6px; font-size: 0.78em; font-family: var(--font-ui);
  cursor: pointer; outline: none; width: 130px;
}
.setting-row select:focus { border-color: var(--accent2); }
.settings-meta-row {
  display: flex;
  flex-wrap: wrap;
  gap: 8px 10px;
  align-items: center;
  font-size: 0.82em;
  color: var(--muted);
}
.settings-meta-row input {
  flex: 1 1 120px;
  min-width: 0;
  background: var(--input-bg);
  color: var(--text);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 4px 8px;
  font-size: 0.95em;
  font-family: var(--font-ui);
  outline: none;
}
.settings-meta-row input:focus { border-color: var(--accent2); }
#instruction-channel-card textarea {
  width: 100%;
  min-height: 96px;
  resize: vertical;
  border: 1px solid var(--border);
  border-radius: 6px;
  background: var(--input-bg);
  color: var(--text);
  padding: 8px;
  font-family: var(--font-ui);
  font-size: 0.82em;
  box-sizing: border-box;
}
#instruction-channel-card textarea:focus {
  border-color: var(--accent2);
  outline: none;
}
.toggle-switch { position: relative; width: 40px; height: 20px; flex-shrink: 0; }
.toggle-switch input { opacity: 0; width: 0; height: 0; }
.toggle-slider {
  position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0;
  background: var(--border); border-radius: 20px; transition: background 0.2s;
}
.toggle-slider:before {
  content: ""; position: absolute; height: 14px; width: 14px;
  left: 3px; bottom: 3px; background: #fff; border-radius: 50%; transition: transform 0.2s;
}
.toggle-switch input:checked + .toggle-slider { background: var(--accent2); }
.toggle-switch input:checked + .toggle-slider:before { transform: translateX(20px); }
#settings-saved { font-size: 0.7em; color: var(--accent2); opacity: 0; transition: opacity 0.3s; }
#settings-saved.show { opacity: 1; }

/* ═══ INPUT ═══ */
#input-panel {
  background: var(--surface);
  border-top: 1px solid var(--border);
  padding: 10px 16px; flex-shrink: 0;
}
#input-panel .input-row { display: flex; gap: 10px; align-items: flex-end; }
#input-panel textarea {
  flex: 1;
  background: var(--input-bg); color: var(--text);
  border: 1px solid var(--border); border-radius: 8px;
  padding: 10px 14px; font-family: var(--font-ui);
  font-size: 0.9em; line-height: 1.5;
  resize: none; min-height: 56px; max-height: 110px;
  outline: none; transition: border-color 0.2s;
}
#input-panel textarea:focus { border-color: var(--accent2); }
.btn-group { display: flex; gap: 6px; flex-shrink: 0; }
#input-panel button {
  padding: 8px 18px; border: none; border-radius: 8px;
  font-size: 0.85em; font-weight: 600; cursor: pointer;
  transition: background 0.15s; font-family: var(--font-ui);
}
.btn-submit { background: var(--accent2); color: #fff; }
.btn-submit:hover { background: #4a6a4a; }
.btn-secondary { background: var(--border); color: var(--text); }
.btn-secondary:hover { background: #c4b9a0; }
.btn-reroll {
  font-size: 0.85em; padding: 1px 6px; border: 1px solid var(--border);
  border-radius: 4px; background: var(--bg); cursor: pointer;
  color: var(--muted); margin-left: 6px; vertical-align: middle;
  transition: background 0.15s, color 0.15s;
}
.btn-reroll:hover { background: var(--accent); color: #fff; border-color: var(--accent); }
.btn-turn-del {
  position: absolute; top: 4px; right: 8px;
  font-size: 0.7em; padding: 2px 7px; border: 1px solid transparent;
  border-radius: 3px; background: transparent; cursor: pointer;
  color: var(--muted); opacity: 0; transition: opacity 0.15s, background 0.15s;
}
.turn-wrap:hover .btn-turn-del { opacity: 1; }
.turn-wrap { position: relative; }
.btn-turn-del:hover { background: #b0624a; color: #fff; border-color: #b0624a; }
.btn-turn-del.confirming { background: #b0624a; color: #fff; opacity: 1; }
.btn-turn-edit {
  position: absolute; top: 4px; right: 92px;
  font-size: 0.7em; padding: 2px 7px; border: 1px solid transparent;
  border-radius: 3px; background: transparent; cursor: pointer;
  color: var(--muted); opacity: 0; transition: opacity 0.15s, background 0.15s;
}
.turn-wrap:hover .btn-turn-edit { opacity: 1; }
.btn-turn-edit:hover { background: var(--accent2); color: #fff; border-color: var(--accent2); }
.player-input-editor-backdrop {
  position: fixed; inset: 0; z-index: 220;
  display: none; align-items: center; justify-content: center;
  padding: 18px; background: rgba(0,0,0,.34);
}
.player-input-editor {
  width: min(94vw, 640px); max-height: min(86vh, 680px);
  background: var(--surface); color: var(--text);
  border: 1px solid var(--border); border-radius: 8px;
  box-shadow: 0 18px 44px rgba(0,0,0,.24);
  display: flex; flex-direction: column; overflow: hidden;
}
.player-input-editor header {
  display: flex; align-items: center; justify-content: space-between;
  gap: 10px; padding: 12px 14px; border-bottom: 1px solid var(--border);
}
.player-input-editor h3 { font-size: 0.95em; color: var(--accent); margin: 0; }
.player-input-editor-close {
  border: 1px solid var(--border); background: var(--input-bg);
  color: var(--muted); border-radius: 5px; padding: 2px 8px; cursor: pointer;
}
.player-input-editor textarea {
  margin: 14px; min-height: 220px; resize: vertical;
  background: var(--input-bg); color: var(--text);
  border: 1px solid var(--border); border-radius: 8px;
  padding: 10px 12px; font-family: var(--font-ui); font-size: 0.9em;
  line-height: 1.55; outline: none;
}
.player-input-editor textarea:focus { border-color: var(--accent2); }
.player-input-editor-actions {
  display: flex; gap: 8px; justify-content: flex-end;
  padding: 0 14px 14px;
}
.player-input-editor-actions button {
  border: none; border-radius: 7px; padding: 8px 12px;
  font-size: 0.82em; font-weight: 600; cursor: pointer;
}
.btn-edit-update { background: var(--border); color: var(--text); }
.btn-edit-branch { background: var(--accent2); color: #fff; }
#input-panel .meta-row {
  display: flex; gap: 12px; align-items: center; margin-top: 6px;
  font-size: 0.75em; color: var(--muted);
}
#input-panel .meta-row input {
  background: var(--input-bg); color: var(--text);
  border: 1px solid var(--border); border-radius: 4px;
  padding: 2px 8px; font-size: 0.9em; width: 120px;
  font-family: var(--font-ui); outline: none;
}
#input-panel .meta-row input:focus { border-color: var(--accent2); }
#toast {
  position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%);
  background: var(--accent2); color: #fff;
  padding: 8px 22px; border-radius: 20px; font-weight: 600;
  font-size: 0.85em; opacity: 0; transition: opacity 0.3s;
  pointer-events: none; z-index: 100;
}
#toast.show { opacity: 1; }

/* ═══ RESPONSIVE LAYOUT ═══ */
@media (max-width: 720px) {
  html, body { height: 100dvh; }
  #topbar {
    position: relative;
    flex-wrap: wrap;
    gap: 5px 8px;
    padding: 6px 48px 6px 10px;
    line-height: 1.35;
  }
  #reply-progress {
    min-width: 86px;
    max-width: 120px;
    gap: 5px;
  }
  #reply-progress-bar { width: 46px; }
  #reply-progress-text { max-width: 64px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  #topbar .spacer { display: none; }
  #topbar .sep { display: none; }
  #theme-toggle {
    margin-left: auto;
    margin-right: 34px;
  }
  #mobile-settings-toggle {
    display: inline-flex;
    position: absolute;
    top: 6px;
    right: 10px;
    z-index: 135;
  }
  #tb-wordcount,
  #tb-tokens {
    display: none;
  }
  #topbar .dim,
  #topbar #tb-stage,
  #topbar #conn-label,
  #topbar #conn-status {
    font-size: 0.72em;
  }
  #main {
    flex-direction: column;
    min-height: 0;
  }
  #content-panel {
    flex: 1 1 auto;
    min-height: 0;
    padding: 14px 12px;
    align-items: stretch;
  }
  #mobile-actions-card {
    display: block;
    flex: 0 0 auto;
    margin: 0 8px 8px;
    max-height: 30vh;
    overflow-y: auto;
  }
  #content-panel #doc,
  #beautify-container,
  .beautify-panel-inline {
    max-width: none;
  }
  #sidebar {
    position: fixed;
    top: 0;
    right: 0;
    bottom: 0;
    width: min(86vw, 360px);
    height: 100dvh;
    max-height: none;
    border-left: 1px solid var(--border);
    border-top: none;
    padding: max(12px, env(safe-area-inset-top)) 12px max(12px, env(safe-area-inset-bottom));
    flex: none;
    font-size: 0.8em;
    z-index: 120;
    box-shadow: -12px 0 24px rgba(0,0,0,.18);
    transform: translateX(104%);
    transition: transform 0.22s ease;
  }
  body.mobile-settings-open #sidebar { transform: translateX(0); }
  #mobile-settings-backdrop {
    display: block;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.28);
    opacity: 0;
    pointer-events: none;
    z-index: 110;
    transition: opacity 0.22s ease;
  }
  body.mobile-settings-open #mobile-settings-backdrop {
    opacity: 1;
    pointer-events: auto;
  }
  #mobile-settings-drawer { display: flex; }
  #sidebar #actions-card { display: none !important; }
  .side-card { padding: 8px 10px; }
  .chip-action {
    max-width: 100%;
    white-space: normal;
    overflow-wrap: anywhere;
  }
  #input-panel { padding: 8px 10px; }
  #input-panel .input-row {
    flex-direction: column;
    align-items: stretch;
  }
  #input-panel textarea {
    min-height: 48px;
    max-height: 88px;
  }
  .btn-group { width: 100%; }
  #input-panel button { flex: 1; }
  #input-panel .meta-row {
    display: none;
  }
}

@media (min-width: 721px) {
  #mobile-actions-card { display: none !important; }
}

@media (max-width: 420px) {
  #sidebar { width: min(90vw, 360px); }
  .turn-wrap { margin-bottom: 16px; }
  .turn-user .turn-text { padding: 10px 12px; }
  .turn-ai .turn-text { line-height: 1.75; }
  .generated-asset-strip { grid-template-columns: 1fr; }
  .btn-turn-edit { right: 78px; }
  .player-input-editor-actions { flex-direction: column; }
  .player-input-editor-actions button { width: 100%; }
}

	/* ═══ GENERATED ASSETS ═══ */
	.generated-asset-strip {
	  margin: 10px 0 18px;
	  display: grid;
	  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
	  gap: 10px;
	}
	.generated-asset-card {
	  background: var(--surface);
	  border: 1px solid var(--border);
	  border-radius: var(--radius-md);
	  overflow: hidden;
	  box-shadow: 0 1px 6px rgba(0,0,0,.08);
	}
	.generated-asset-card img {
	  display: block;
	  width: 100%;
	  max-height: 320px;
	  object-fit: cover;
	  cursor: zoom-in;
	}
	.generated-asset-caption {
	  padding: 7px 9px;
	  font-size: 0.72em;
	  color: var(--muted);
	  line-height: 1.4;
	}
	.generated-asset-caption b { color: var(--accent); }

/* ═══ DARK MODE OVERRIDES ═══ */
[data-theme="dark"] .turn-ai .turn-text {
  color: #e8dcc8;
}
[data-theme="dark"] .turn-user .turn-text {
  background: #1e1e2a;
  border-left-color: #d4946a;
  color: #c4bcaa;
}
[data-theme="dark"] #topbar .tag { color: #1b1b26; }
[data-theme="dark"] .btn-submit { color: #1b1b26; }
[data-theme="dark"] .chip-hot { color: #1b1b26; }
[data-theme="dark"] .toggle-slider:before { background: #d4c5b9; }
[data-theme="dark"] input[type="range"] { accent-color: var(--accent); }
[data-theme="dark"] #settings-saved { color: #7aaa7a; }
[data-theme="dark"] #theme-toggle:hover { background: var(--surface); }
[data-theme="dark"] .btn-reroll:hover { color: #1b1b26; }
[data-theme="dark"] .btn-turn-del:hover,
[data-theme="dark"] .btn-turn-del.confirming { color: #fff; }
[data-theme="dark"] #toast { color: #1b1b26; }

/* ═══ MVU Variable Tree ═══ */
#sb-mvu-vars {
  max-height: 300px; overflow-y: auto;
  font-family: "Cascadia Code", "Consolas", "Monaco", monospace;
  font-size: 0.78em; line-height: 1.6;
}
.mvu-entry { padding: 1px 0 1px 8px; }
.mvu-key { color: var(--muted); }
.mvu-str { color: var(--accent2); }
.mvu-num { color: #b0624a; }
.mvu-bool { color: #5a8a9a; font-weight: 600; }
.mvu-null { color: var(--muted); font-style: italic; }
.mvu-empty { color: var(--muted); font-style: italic; }
#sb-mvu-vars details { margin-left: 4px; }
#sb-mvu-vars summary {
  cursor: pointer; color: var(--accent);
  outline: none; font-size: 0.9em;
}
#sb-mvu-vars summary:hover { opacity: 0.8; }
.mvu-delta {
  animation: mvu-flash 2s ease-out;
  border-radius: 2px;
}
@keyframes mvu-flash {
  0% { background: rgba(176, 106, 61, 0.35); }
  100% { background: transparent; }
}
[data-theme="dark"] @keyframes mvu-flash {
  0% { background: rgba(212, 148, 106, 0.3); }
  100% { background: transparent; }
}

/* ═══ BEAUTIFY DASHBOARD (card's 状态栏) ═══ */
#sb-beautify {
  font-family: var(--font-body);
  font-size: 0.78em; line-height: 1.5;
  color: var(--text);
}
.beautify-dashboard {
  border: 1px solid var(--line);
  background: var(--surface);
  border-radius: var(--radius-md);
  overflow: hidden;
}
.beautify-header {
  padding: 10px 12px 6px;
  background: var(--soft);
  border-bottom: 1px solid var(--line);
}
.beautify-header-kicker {
  font-size: 0.62rem; text-transform: uppercase;
  letter-spacing: 0.12em; color: var(--muted);
}
.beautify-header-title {
  font-family: var(--font-display);
  font-size: 1rem; font-weight: 600;
  color: var(--text); margin: 2px 0 6px;
}
.beautify-meta-chips {
  display: flex; gap: 6px; flex-wrap: wrap;
}
.beautify-meta-chip {
  font-size: 0.68rem; color: var(--muted);
  background: var(--ink); padding: 2px 8px;
  border-radius: var(--radius-full);
  border: 1px solid var(--line);
}
.beautify-tabs {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(70px, 1fr));
  gap: 1px; background: var(--line);
  border-bottom: 1px solid var(--line);
}
.beautify-tab-btn {
  background: var(--soft); border: none;
  color: var(--muted); padding: 6px 4px; cursor: pointer;
  font-size: 11px; text-align: center;

  font-family: var(--font-body);
  transition: background 0.15s, color 0.15s;
}
.beautify-tab-btn.active {
  background: var(--surface); color: var(--text);
  font-weight: 600; border-bottom: 2px solid var(--color-ember);
}
.beautify-tab-btn:hover { color: var(--text); }
.beautify-body {
  padding: 8px;
}
.beautify-info-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
  gap: 6px;
}
.beautify-info-card {
  background: var(--soft);
  border: 1px solid var(--line);
  border-radius: var(--radius-sm);
  padding: 8px 10px;
}
.beautify-info-label {
  font-size: 0.65rem; text-transform: uppercase;
  letter-spacing: 0.1em; color: var(--muted);
  margin-bottom: 3px;
}
.beautify-info-value {
  font-size: 0.85rem; font-weight: 600;
  color: var(--text);
}
.beautify-partner-header {
  display: flex; gap: 6px; align-items: center;
  flex-wrap: wrap; margin-bottom: 8px;
}
.beautify-partner-name {
  font-family: var(--font-display); font-size: 0.95rem;
  font-weight: 600; color: var(--text);
}
.beautify-partner-chip {
  font-size: 0.68rem; color: var(--muted);
  background: var(--soft); padding: 1px 8px;
  border-radius: var(--radius-full);
  border: 1px solid var(--line);
}
.beautify-detail-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
  gap: 6px; margin-bottom: 8px;
}
.beautify-detail-item {
  background: var(--soft);
  border: 1px solid var(--line);
  border-radius: var(--radius-sm);
  padding: 6px 8px;
}
.beautify-detail-label {
  font-size: 0.62rem; text-transform: uppercase;
  letter-spacing: 0.1em; color: var(--muted);
}
.beautify-detail-value {
  font-size: 0.78rem; color: var(--text);
  margin-top: 2px;
}
.beautify-jung-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
  gap: 4px; margin-top: 6px;
}
.beautify-jung-item {
  background: var(--soft);
  border: 1px solid var(--line);
  border-radius: var(--radius-sm);
  padding: 5px 6px; text-align: center;
}
.beautify-jung-role {
  font-size: 0.6rem; color: var(--muted);
  text-transform: uppercase; letter-spacing: 0.08em;
}
.beautify-jung-func {
  font-size: 0.9rem; font-weight: 700;
  color: var(--color-ember);
  font-family: var(--font-display);
}
.beautify-kink-text {
  font-size: 0.82rem; color: var(--text);
  line-height: 1.6; padding: 4px 0;
}
.beautify-empty {
  color: var(--muted); font-style: italic;
  padding: 8px; text-align: center;
}
.beautify-highlight { color: var(--color-ember); font-weight: 600; }
.beautify-tag {
  display: inline-block;
  background: var(--soft); border: 1px solid var(--line);
  padding: 1px 5px; border-radius: var(--radius-full);
  margin: 1px 2px; font-size: 10px;
}
.beautify-section { margin-bottom: 2px; }
.beautify-section-title {
  color: var(--color-ember); font-weight: bold;
  border-bottom: 1px solid var(--line);
  margin-bottom: 3px; padding-bottom: 2px;
  font-size: 13px; cursor: pointer;
}
.beautify-flat-panel {
  padding: 4px 0;
}
.beautify-npc-tabs {
  display: flex; gap: 1px; flex-wrap: wrap;
}
.beautify-npc-panel {
  padding: 4px 0;
}
.beautify-npc-details { display: flex; flex-direction: column; gap: 2px; }
.beautify-npc-details .data-row { margin: 1px 0; }
.beautify-sub {
  margin: 1px 0;
}
.beautify-sub summary {
  cursor: pointer; font-size: 11px;
  color: var(--muted);
}
.beautify-sub summary:hover { color: var(--text); }
.data-row {
  display: flex; align-items: baseline; gap: 4px;
  margin: 2px 0; padding: 1px 0;
  border-bottom: 1px dotted rgba(90, 69, 48, 0.3);
  font-size: 12px;
}
.data-row .k { color: var(--muted); font-size: 11px; min-width: 60px; flex-shrink: 0; }

/* ═══ INLINE VARIABLE CARDS ═══ */
.turn-vars {
  margin: 6px 0 2px 0;
  display: flex; flex-wrap: wrap; gap: 5px;
  font-family: var(--font-ui);
}
.tv-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 5px 8px;
  min-width: 140px;
  flex: 1 1 auto;
  max-width: 260px;
}
.tv-card.delta {
  border-left: 3px solid var(--color-ember);
  background: rgba(217, 119, 6, 0.04);
}
.tv-card-header {
  display: flex; align-items: center; gap: 5px;
  margin-bottom: 3px;
  font-size: 0.78em; font-weight: 600;
  color: var(--accent);
}
.tv-card-header .tv-name { flex: 1; }
.tv-portrait-thumb {
  width: 26px; height: 26px; border-radius: 50%;
  object-fit: cover; border: 1px solid var(--border);
  cursor: pointer; flex-shrink: 0;
}
.tv-portrait-thumb:hover { border-color: var(--accent); }
.tv-stat-row {
  display: flex; align-items: center; gap: 4px;
  font-size: 0.68em; padding: 1px 0;
}
.tv-stat-label { color: var(--muted); min-width: 38px; flex-shrink: 0; }
.tv-stat-value { color: var(--text); font-weight: 600; min-width: 20px; text-align: right; font-size: 0.9em; }
.tv-stat-bar-bg {
  flex: 1; height: 3px; background: var(--border);

}

}
.tv-delta-item {

  display: inline-flex; align-items: center; gap: 3px;

}
.tv-card-compact .name { color: var(--muted); }
.tv-card-compact .val { color: var(--text); font-weight: 600; }

/* ═══ PORTRAIT THUMBNAILS ═══ */
.beautify-portrait-thumb {
  width: 48px; height: 64px; object-fit: cover;
  border-radius: 3px; border: 1px solid var(--border);
  cursor: pointer; transition: transform 0.15s;
  flex-shrink: 0;
}
.beautify-portrait-thumb:hover { transform: scale(1.08); border-color: var(--accent); }

/* Tabs */

}
.beautify-panel-inline .beautify-tab-btn {

.beautify-panel-inline .beautify-tab-avatar {

}
/* World tab info grid */

}
.beautify-panel-inline .beautify-info-card {
  display: flex; align-items: center; gap: 6px;
  padding: 4px 0;
  border-bottom: 1px solid rgba(255,255,255,0.05);

}
.beautify-panel-inline .beautify-info-label {
  color: rgba(255,255,255,0.45);
  min-width: 48px; font-size: 0.9em;
}
.beautify-panel-inline .beautify-info-value {
  color: rgba(255,255,255,0.85); font-weight: 500;
}
/* collapsible sub-sections (non-standard dicts) */
.beautify-panel-inline .beautify-sub {
  margin: 3px 0;
  font-size: 0.72em;
}
.beautify-panel-inline .beautify-sub summary {
  cursor: pointer;
  color: rgba(255,255,255,0.45);
  padding: 2px 0;
}
.beautify-panel-inline .beautify-sub summary:hover { color: rgba(255,255,255,0.7); }
/* Stat bars (shared with sidebar, adapted for dark bg) */
.beautify-panel-inline .tv-stat-row {

  font-size: 0.7em; padding: 1px 0;
}
.beautify-panel-inline .tv-stat-label {
  color: rgba(255,255,255,0.5); min-width: 44px; flex-shrink: 0;
}
.beautify-panel-inline .tv-stat-value {
  color: rgba(255,255,255,0.85); font-weight: 600;
  min-width: 24px; text-align: right;
}
.beautify-panel-inline .tv-stat-bar-bg {
  flex: 1; height: 4px;
  background: rgba(255,255,255,0.1);
  border-radius: 2px; overflow: hidden;
}
.beautify-panel-inline .tv-stat-bar-fill {
  height: 100%; border-radius: 2px;
  transition: width 0.5s ease;
}

<div id="topbar">
  <span class="dot green"></span>
  <span class="dot yellow"></span>
  <span class="dot red"></span>

  <span class="sep">|</span>
  <span id="tb-stage">—</span>
  <span class="sep">|</span>
  <span class="dim" id="tb-time">—</span>

  <span class="dim" id="tb-location">—</span>

      <span id="reply-progress-text">等待中</span>

    <span id="reply-progress-detail"></span>

  s.onerror = () => {

function countChineseChars(html) {
  // Strip HTML tags, entities, whitespace, and punctuation
  const text = html
    .replace(/<[^>]*>/g, '')
    .replace(/&[^;]+;/g, '')
    .replace(/[\s\n\r]/g, '');
  // Count CJK characters (Chinese, Japanese kanji) + letters/numbers as words
  const cjk = text.match(/[一-鿿㐀-䶿]/g);
  const alpha = text.match(/[a-zA-Z0-9]+/g);
  return (cjk ? cjk.length : 0) + (alpha ? alpha.length : 0);
}

function updateWordCount() {
  const el = document.getElementById('tb-wordcount');
  if (!el) return;
  const target = parseInt(document.getElementById('set-wordcount').value) || 600;
  const threshold = Math.floor(target * 0.8);

  // Get last AI turn text
  const turns = document.querySelectorAll('.turn-ai .turn-text');
  if (turns.length === 0) { el.textContent = '字数: —'; el.style.color = ''; return; }
  const lastTurn = turns[turns.length - 1];
  const count = countChineseChars(lastTurn.innerHTML);

  let color;
  if (count >= target) {
    color = '#5a7a5a'; // green - met or exceeded
  } else if (count >= threshold) {
    color = '#cc9a56'; // amber - within 80%
  } else {
    color = '#b0624a'; // red - below 80%
  }
  el.textContent = '字数: ' + count + '/' + target;
  el.style.color = color;
  el.title = count >= target ? '已达到目标字数' :
    count >= threshold ? '接近目标字数 (≥80%)' :
    '⚠ 未达目标字数的80%，建议重roll';
}

// ═══ Client-side macro resolver — mirrors MVU engine display-time resolution ═══
// In the real MVU pipeline, {{format_message_variable::stat_data.XXX}} macros
// are resolved dynamically at render time against the live stat_data tree.
// We replicate that here so the beautify panel always reflects current state.
function resolveBeautifyMacros(html) {
  if (!html || html.indexOf('{{') < 0) return html;
  var vars = window.MVU_VARIABLES || {};
  var statData = vars.stat_data || vars;

  function _lookup(pathStr) {
    // Strip stat_data. prefix — window.MVU_VARIABLES is the stat_data root
    var p = pathStr;
    if (p.indexOf('stat_data.') === 0) p = p.slice(10);
    var keys = p.split('.');
    var cur = statData;
    for (var i = 0; i < keys.length; i++) {
      if (cur == null || typeof cur !== 'object') return null;
      cur = cur[keys[i]];
    }
    return cur;
  }

  function _format(v) {
    if (v === null || v === undefined) return '(未定义)';
    if (typeof v === 'string' || typeof v === 'number' || typeof v === 'boolean') return String(v);
    // Nested objects: render as compact key: value lines
    if (typeof v === 'object' && !Array.isArray(v)) {
      var lines = [];
      var keys = Object.keys(v);
      for (var ki = 0; ki < keys.length; ki++) {
        var kv = v[keys[ki]];
        if (kv !== null && typeof kv === 'object') {
          lines.push(keys[ki] + ': ' + JSON.stringify(kv));
        } else {
          lines.push(keys[ki] + ': ' + String(kv !== undefined ? kv : '—'));
        }
      }
      return lines.join(', ');
    }
    if (Array.isArray(v)) {
      return v.map(function(item) {
        return typeof item === 'object' ? JSON.stringify(item) : String(item);
      }).join(', ');
    }
    return String(v);
  }

  // {{format_message_variable::stat_data.XXX}} → formatted value
  html = html.replace(/\{\{format_message_variable::stat_data\.([^}]+)\}\}/g, function(_, path) {
    return _format(_lookup(path));
  });

  // {{format_message_variable::XXX}} without stat_data prefix → from root
  html = html.replace(/\{\{format_message_variable::([^}]+)\}\}/g, function(_, path) {
    return _format(_lookup(path));
  });

  // {{getvar::stat_data.XXX}} → scalar value (bare, no formatting)
  html = html.replace(/\{\{getvar::stat_data\.([^}]+)\}\}/g, function(_, path) {
    var v = _lookup(path);
    return (v !== null && v !== undefined) ? String(v) : '(未定义)';
  });

  // {{getvar::XXX}} without stat_data prefix
  html = html.replace(/\{\{getvar::([^}]+)\}\}/g, function(_, path) {
    var v = _lookup(path);
    return (v !== null && v !== undefined) ? String(v) : '(未定义)';
  });

  return html;
}

function render() {
  if (!window.STATE) return;

  syncPlayerName();
  const S = window.STATE;
  document.title = (S.world || 'RP') + ' — ' + (S.stage || '');

  // Top bar (only update if changed to avoid DOM flicker)
  setText('tb-world', replaceUser(S.world || '—'));
  setText('tb-stage', S.stage || '—');
  setText('tb-time', S.time || '—');
  setText('tb-location', S.location || '—');
  setText('tb-count', '已生成: ' + (S.generatedCount || 0));

  // Content — only replace DOM when the source string actually
  // changed.  Comparing against live innerHTML would fire every poll
  // because initApp() mutates the DOM (flip-card backs, etc.), which
  // would destroy card state and re-run scripts unnecessarily.
  const contentEl = document.getElementById('doc');
  let newContent = window.CONTENT_HTML || '<div style="padding:60px;text-align:center;color:var(--muted);">等待生成内容...</div>';
  newContent = replaceUser(newContent);
  // Apply card author's regex scripts via SillyTavern-compatible engine.
  // Uses getRegexedString() from _regex_engine.js with proper placement
  // filtering (markdownOnly/promptOnly/placement/depth).
  var regexScripts = window.REGEX_SCRIPTS || [];
  if (regexScripts.length && typeof window.registerRegexScripts === 'function') {
    window.registerRegexScripts(regexScripts);
    newContent = window.getRegexedString(newContent, 2 /* AI_OUTPUT */, { isMarkdown: true });
  }
  var assetSig = JSON.stringify((window.CARD_ASSETS && window.CARD_ASSETS.images) || []);
  if (_prevContentHtml !== newContent || _prevAssetSig !== assetSig) {
    _prevContentHtml = newContent;
    _prevAssetSig = assetSig;
    contentEl.innerHTML = newContent;
    renderGeneratedAssets(contentEl);
    // Re-execute embedded <script> tags (innerHTML doesn't run them).
    // The _st_shims.js globals are already loaded, so card-author
    // beautify scripts find their expected ST/MVU APIs.
    var embScripts = contentEl.querySelectorAll('script');
    for (var si = 0; si < embScripts.length; si++) {
      var oldS = embScripts[si];
      var newS = document.createElement('script');
      if (oldS.textContent) {
        newS.textContent = 'try {\n' + oldS.textContent + '\n} catch(e) { console.error("[card-script] Execution error:", e); if (typeof toastr !== "undefined") toastr.error("[card-script] " + e.message); }';
      }
      if (oldS.src) newS.src = oldS.src;
      oldS.parentNode.replaceChild(newS, oldS);
    }
    // Only auto-scroll if user is already near the bottom
    const panel = document.getElementById('content-panel');
    if (panel) {
      const distToBottom = panel.scrollHeight - (panel.scrollTop + panel.clientHeight);
      if (distToBottom < 200) {
        setTimeout(() => { panel.scrollTop = panel.scrollHeight; }, 80);
      }
    }
  }

  // Beautify panel — rendered independently of narrative content.
  // Macros ({{format_message_variable::stat_data.XXX}}) are resolved
  // client-side against window.MVU_VARIABLES at display time, mirroring
  // the real MVU pipeline. Resolution runs every poll cycle so variable
  // updates are reflected immediately without a server round-trip.
  const beautifyEl = document.getElementById('beautify-container');
  let rawBeautify = window.BEAUTIFY_HTML || '';
  let newBeautify = resolveBeautifyMacros(rawBeautify);
  newBeautify = replaceUser(newBeautify);
  if (_prevBeautifyHtml !== newBeautify) {
    _prevBeautifyHtml = newBeautify;
    beautifyEl.innerHTML = newBeautify;
    var embScriptsB = beautifyEl.querySelectorAll('script');
    for (var sj = 0; sj < embScriptsB.length; sj++) {
      var oldSB = embScriptsB[sj];
      var newSB = document.createElement('script');
      if (oldSB.textContent) {
        newSB.textContent = 'try {\n' + oldSB.textContent + '\n} catch(e) { console.error("[beautify-script] Execution error:", e); }';
      }
      if (oldSB.src) newSB.src = oldSB.src;
      oldSB.parentNode.replaceChild(newSB, oldSB);
    }
    console.log('[beautify] Re-executed ' + embScriptsB.length + ' script(s), jQuery=' + (typeof $) + ', _=' + (typeof _));
  }

  // Sidebar
  setText('sb-quest', replaceUser(S.quest || '—'));
  const sum = replaceUser(window.SUMMARY_TEXT || '暂无');
  setText('sb-summary', sum);

  // Actions — prefer per-turn TURN_OPTIONS, fall back to static S.actions
  const actionsCard = document.getElementById('actions-card');
  const turnOpts = window.TURN_OPTIONS;
  const mobileActionsCard = document.getElementById('mobile-actions-card');
  const actionsDiv = document.getElementById('sb-actions');
  const mobileActionsDiv = document.getElementById('mobile-actions');
  const actionTargets = [
    { card: actionsCard, title: actionsCard ? actionsCard.querySelector('h4') : null, body: actionsDiv },
    { card: mobileActionsCard, title: document.getElementById('mobile-actions-title'), body: mobileActionsDiv }
  ];
  function setActionTargets(titleHtml, opts) {
    actionTargets.forEach(function(target) {
      if (!target.card || !target.body) return;
      target.card.style.display = '';
      if (target.title) target.title.innerHTML = titleHtml;
      renderOptions(target.body, opts);
    });
  }
  function hideActionTargets() {
    actionTargets.forEach(function(target) {
      if (target.card) target.card.style.display = 'none';
      if (target.body) target.body.innerHTML = '';
    });
  }
  if (turnOpts && turnOpts.length > 0) {
    setActionTargets('🎯 下一步行动' + (S.generatedCount > 0 ? ' <button class="btn-reroll" onclick="doReroll()" title="重roll最后一轮">🔄</button>' : ''), turnOpts);
  } else if (S.actions && S.actions.length > 0) {
    setActionTargets('📂 可选项' + (S.generatedCount > 0 ? ' <button class="btn-reroll" onclick="doReroll()" title="重roll最后一轮">🔄</button>' : ''), S.actions);
  } else {
    hideActionTargets();
  }


  // NPCs
  const npcsCard = document.getElementById('npcs-card');
  if (S.npcs && S.npcs.length > 0) {
    npcsCard.style.display = '';
    setHtml('sb-npcs', S.npcs.map(n =>
      `<span class="chip ${n.important ? 'chip-hot' : 'chip-normal'}">${replaceUser(n.name)}</span>`
    ).join(''));
  } else {
    npcsCard.style.display = 'none';
  }

  // MVU Variables
  renderMvuVars();

  // Beautify Dashboard
  renderBeautify();

  // Inject per-turn delete buttons
  injectTurnButtons();

  // Word count check
  updateWordCount();

  // Token count display
  updateTokenCount();

  // Openings switcher visibility
  updateOpeningsCard(S);

  // Notify beautify panel of fresh variable data.
  // Matches real MVU lifecycle: mag_variable_update_ended fires after
  // all updates for the reply are complete.  The card-author beautify
  // script registered eventOn(Mvu.events.VARIABLE_UPDATE_ENDED, renderData)
  // inside initApp(), so this triggers a data refresh without DOM reset.
  if (window.eventEmit && window.Mvu) {
    window.eventEmit(window.Mvu.events.VARIABLE_UPDATE_ENDED);
  }
}

function renderGeneratedAssets(contentEl) {
  var assets = (window.CARD_ASSETS && window.CARD_ASSETS.images) || [];
  if (!contentEl || !assets.length) return;
  var display = assets.filter(function(a) {
    return a && a.url && (a.kind === 'scene' || a.kind === 'scene_illustration' || a.target === 'scene_illustration');
  }).slice(-3);
  if (!display.length) return;
  var strip = document.createElement('div');
  strip.className = 'generated-asset-strip';
  display.forEach(function(a) {
    var card = document.createElement('div');
    card.className = 'generated-asset-card';
    var img = document.createElement('img');
    img.src = a.url;
    img.alt = a.kind || 'generated image';
    img.onclick = function() { zoomPortrait(a.url); };
    var cap = document.createElement('div');
    cap.className = 'generated-asset-caption';
    cap.innerHTML = '<b>' + escHtml(a.kind || 'image') + '</b> · ' + escHtml(a.target || '') + '<br>' + escHtml((a.prompt || '').slice(0, 90));
    card.appendChild(img);
    card.appendChild(cap);
    strip.appendChild(card);
  });
  contentEl.appendChild(strip);
}

function injectTurnButtons() {
  const doc = document.getElementById('doc');
  const turns = doc.querySelectorAll('.turn-wrap');
  turns.forEach(function(turn, i) {
    const oldDel = turn.querySelector('.btn-turn-del');
    if (oldDel) oldDel.remove();
    const oldEdit = turn.querySelector('.btn-turn-edit');
    if (oldEdit) oldEdit.remove();

    const userDiv = turn.querySelector('.turn-user[data-player-input-id]');
    if (userDiv && !turn.classList.contains('turn-pending')) {
      const editBtn = document.createElement('button');
      editBtn.className = 'btn-turn-edit';
      editBtn.textContent = '编辑输入';
      editBtn.title = '编辑此轮玩家原始输入';
      editBtn.addEventListener('click', function(e) {
        e.stopPropagation();
        openPlayerInputEditor(userDiv.getAttribute('data-player-input-id'));
      });
      turn.appendChild(editBtn);
    }

    // Don't add delete on first opening turn (index 0) if we want to keep the opener
    const btn = document.createElement('button');
    btn.className = 'btn-turn-del';
    btn.textContent = '↩ 回退到此';
    btn.title = '删除此轮及之后所有内容';
    btn.addEventListener('click', function(e) {
      e.stopPropagation();
      if (btn.classList.contains('confirming')) {
        doDeleteFrom(i);
      } else {
        btn.classList.add('confirming');
        btn.textContent = '确认回退？';
        setTimeout(function() {
          btn.classList.remove('confirming');
          btn.textContent = '↩ 回退到此';
        }, 3000);
      }
    });
    const aiDiv = turn.querySelector('.turn-ai');
    if (aiDiv) aiDiv.appendChild(btn);
  });
}

  const role = document.getElementById('role-input');

}

async function doReroll() {
  const btn = document.querySelector('.btn-reroll');
  if (btn) { btn.disabled = true; btn.textContent = '⏳'; }
  try {
    const r = await fetch(BRIDGE + '/api/reroll', { method: 'POST' });
    const data = await r.json();
    if (data.ok) {
      showToast('🔄 已触发重roll，等待重新生成...');
      // Poll more frequently for a bit
      let tries = 0;
      const check = setInterval(function() {
        reloadData();
        tries++;
        if (tries > 20) clearInterval(check); // stop after ~60s
      }, 2500);
      setTimeout(function() { clearInterval(check); }, 60000);
    } else {
      showError('重roll失败: ' + (data.error || '未知错误'));
    }
  } catch(e) {
    showError('无法连接服务器');
  }
  if (btn) { btn.disabled = false; btn.textContent = '🔄'; }
}

async function loadOpenings() {

    if (!r.ok) return;

function findPlayerInput(inputId) {
  const inputs = window.PLAYER_INPUTS || [];
  for (let i = 0; i < inputs.length; i++) {
    if (inputs[i] && inputs[i].id === inputId) return inputs[i];
  }
  return null;
}

function openPlayerInputEditor(inputId) {
  const item = findPlayerInput(inputId);
  if (!item) {
    showError('未找到玩家输入记录');
    return;
  }
  activePlayerInputId = inputId;
  const textarea = document.getElementById('player-input-editor-text');
  const backdrop = document.getElementById('player-input-editor-backdrop');
  textarea.value = item.raw_text || item.display_text || '';
  backdrop.style.display = 'flex';
  setTimeout(function() { textarea.focus(); }, 30);
}

function closePlayerInputEditor() {
  activePlayerInputId = null;
  const backdrop = document.getElementById('player-input-editor-backdrop');

async function submitPlayerInputEdit(mode) {
  if (!activePlayerInputId) return;
  const textarea = document.getElementById('player-input-editor-text');
  const newText = textarea.value;
  if (newText === '') {
    showError('玩家输入不能为空');
    return;
  }
  try {
    const r = await fetch(BRIDGE + '/api/player_inputs/edit', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ id: activePlayerInputId, new_text: newText, mode: mode })
    });
    const data = await r.json();
    if (!data.ok) {
      showError('编辑失败: ' + (data.error || '未知错误'));
      return;
    }
    closePlayerInputEditor();
    if (mode === 'branch_submit') {
      setProgressVisible({ stage: 'received', label: '已从历史输入开启分支', percent: 10 });
      showToast('已更新并提交，等待 Claude Code 从该处继续');
    } else {
      showToast('已更新玩家输入，Claude Code 将评估影响');
    }

function formatProgressDetail(progress) {
  if (!progress || progress.schema_version !== 2) return '';
  const parts = [];
  if (progress.state) parts.push(progress.state);
  const detail = progress.detail && typeof progress.detail === 'object' ? progress.detail : {};
  if (detail.agent) parts.push('agent=' + detail.agent);
  if (detail.subgm_thread_id) parts.push('subGM=' + detail.subgm_thread_id);
  if (detail.actor_call_id) parts.push('call=' + detail.actor_call_id);
  if (detail.batch_id) parts.push('batch=' + detail.batch_id);
  if (detail.attempt) {
    const max = detail.max_attempts ? '/' + detail.max_attempts : '';
    parts.push('attempt=' + detail.attempt + max);
  }
  if (detail.reason) parts.push('reason=' + detail.reason);
  return parts.join(' · ');
}

function setProgressVisible(progress) {
  const box = document.getElementById('reply-progress');
  const text = document.getElementById('reply-progress-text');
  const fill = document.getElementById('reply-progress-fill');
  const detailBox = document.getElementById('reply-progress-detail');
  if (!box || !text || !fill) return;

  const isV2 = progress && progress.schema_version === 2;
  const stage = isV2 ? progress.state : progress && progress.stage;
  const legacyTerminalStages = ['complete', 'done', 'blocked', 'error'];
  const legacyCompletionStages = ['complete', 'done'];
  const terminal = isV2 ? !!progress.terminal : legacyTerminalStages.indexOf(stage) >= 0;
  const activeStages = ['received', 'preparing', 'generating', 'delivering', 'finalizing', 'retry', 'error'];
  const isActive = isV2 ? !!stage && stage !== 'idle' : activeStages.indexOf(stage) >= 0;
  const isComplete = isV2 ? stage === 'complete' : legacyCompletionStages.indexOf(stage) >= 0;
  if (progressHideTimer) {
    clearTimeout(progressHideTimer);
    progressHideTimer = null;
  }

  if (!isActive && !isComplete && !terminal) {
    box.classList.remove('show', 'indeterminate');
    if (detailBox) detailBox.textContent = '';
    return;
  }

  text.textContent = progress.label || '处理中';
  const detail = formatProgressDetail(progress);
  if (detailBox) {
    detailBox.textContent = detail;
    detailBox.hidden = !detail;
  }
  const pct = Number(progress.percent);
  if (Number.isFinite(pct)) {
    box.classList.remove('indeterminate');
    fill.style.width = Math.max(0, Math.min(100, pct)) + '%';
  } else {
    box.classList.add('indeterminate');
    fill.style.width = '';
  }
  box.classList.add('show');

  if (isComplete) {
    progressHideTimer = setTimeout(function() {
      box.classList.remove('show', 'indeterminate');
    }, 2200);
  }
}

async function loadProgress() {
  try {
    const r = await fetch(BRIDGE + '/api/progress');
    if (!r.ok) return;
    const progress = await r.json();
    setProgressVisible(progress);
  } catch(e) {
    // Progress is optional; leave the rest of the UI usable.
  }
}

async function doSubmit() {
  console.log('[RP-Frontend] doSubmit called');
  const roleInput = document.getElementById('role-input');
  const instructionInput = document.getElementById('instruction-input');
  const roleText = roleInput ? roleInput.value : '';
  const instructionText = instructionInput ? instructionInput.value : '';
  if (!roleText.trim() && !instructionText.trim()) return;
  syncLegacyInputBridge();

  const btn = document.querySelector('.btn-submit');
  btn.disabled = true; btn.textContent = '...';

  try {
    const r = await fetch(BRIDGE + '/api/submit', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        text: roleText,
        roleText: roleText,
        instructionText: instructionText
      })
    });
    const data = await r.json();
    if (data.ok) {
      setProgressVisible({ stage: 'received', label: '已发送，等待处理', percent: 10 });
      reloadData();
      if (roleInput) roleInput.value = '';
      if (instructionInput) instructionInput.value = '';
      syncLegacyInputBridge();
      const toast = document.getElementById('toast');
      toast.textContent = '✓ 已发送，等待 Claude Code 回应...';
      toast.style.background = 'var(--accent2)';
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2500);
    } else {
      showError('发送失败: ' + (data.error || '未知错误'));
    }
  } catch(e) {
    showError('无法连接服务器 — 请确保已运行 python skills/server.py');
  }
  btn.disabled = false; btn.textContent = '▶ 提交';
}

function showError(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = '✗ ' + msg;
  toast.style.background = '#b0624a';
  toast.classList.add('show');
  setTimeout(() => { toast.classList.remove('show'); toast.style.background = 'var(--accent2)'; }, 3000);
}

function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.style.background = 'var(--accent2)';
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 3000);
}

function doClear() {
  const roleInput = document.getElementById('role-input');
  const instructionInput = document.getElementById('instruction-input');
  if (roleInput) roleInput.value = '';
  if (instructionInput) instructionInput.value = '';
  syncLegacyInputBridge();
  if (roleInput) roleInput.focus();
}

document.getElementById('role-input').addEventListener('input', syncLegacyInputBridge);
document.getElementById('role-input').addEventListener('change', syncLegacyInputBridge);
document.getElementById('role-input').addEventListener('keydown', function(e) {
  if (e.ctrlKey && e.key === 'Enter') { e.preventDefault(); doSubmit(); }
});

// ═══ Settings ═══
let styleProfiles = [];

async function loadStyleProfiles() {
  try {
    const r = await fetch(BRIDGE + '/api/style-profiles');
    if (!r.ok) return;
    styleProfiles = await r.json();
    const sel = document.getElementById('set-style');
    const currentValue = sel.value;
    sel.innerHTML = styleProfiles.map(function(p) {
      return '<option value="' + p.name + '">' + p.title + '</option>';
    }).join('');
    if (currentValue) sel.value = currentValue;
    updateStyleDescription();
  } catch(e) { /* server not ready */ }
}

function updateStyleDescription() {
  const sel = document.getElementById('set-style');
  const name = sel ? sel.value : '';
  const profile = styleProfiles.find(function(p) { return p.name === name; });
  const desc = document.getElementById('style-desc');
  if (desc) desc.textContent = profile ? profile.description : '';
}

async function loadSettings() {
  try {
    const r = await fetch(BRIDGE + '/api/settings');
    if (!r.ok) return;
    const s = await r.json();
    await loadStyleProfiles();
    document.getElementById('set-style').value = s.style || '北棱特调';
    updateStyleDescription();
    document.getElementById('set-nsfw').value = s.nsfw || '直白';
    document.getElementById('set-wordcount').value = s.wordCount || 600;
    document.getElementById('set-self-repair-mode').value = s.selfRepairMode || 'limited';
    document.getElementById('set-source-code-self-repair').checked = s.allowSourceCodeSelfRepair === true;
    document.getElementById('set-model-debug-mode').checked = s.modelDebugMode === true;
    render();
  } catch(e) { /* server may not be ready yet */ }
}

async function saveSettings() {
  const data = {
    style: document.getElementById('set-style').value,
    nsfw: document.getElementById('set-nsfw').value,
    wordCount: parseInt(document.getElementById('set-wordcount').value) || 600,
    selfRepairMode: document.getElementById('set-self-repair-mode').value,
    allowSourceCodeSelfRepair: document.getElementById('set-source-code-self-repair').checked,
    modelDebugMode: document.getElementById('set-model-debug-mode').checked
  };
  try {
    await fetch(BRIDGE + '/api/settings', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(data)
    });
    updateStyleDescription();
    const badge = document.getElementById('settings-saved');
    badge.classList.add('show');
    setTimeout(() => badge.classList.remove('show'), 1500);
  } catch(e) { /* offline */ }
}

function updateTokenCount() {
  var el = document.getElementById('tb-tokens');
  if (!el) return;
  var turnTokens = window.TURN_TOKENS || {};
  var startupCost = window.STARTUP_COST || {};
  var keys = Object.keys(turnTokens);
  var parts = [];

  // Startup cost (one-time import/setup — persistent line item)
  var startupTotal = startupCost.total || 0;
  if (startupTotal > 0) {
    parts.push('启动 ' + formatNum(startupTotal));
  }

  if (keys.length > 0) {
    var last = turnTokens[keys[keys.length - 1]];
    // Skip per-round display for opening turn — its tokens are the startup cost
    var isOpening = (keys.length === 1 && last.is_startup);
    if (!isOpening) {
      var roundTotal = last.round_total || last.total || 0;
      if (roundTotal > 0) {
        parts.push('本轮 ' + formatNum(roundTotal));
      }
    }
    // Cache hit rate (prefer latest round, fall back to startup)
    var cacheHit = last.cache_hit || startupCost.cache_hit || 0;
    if (cacheHit > 0) {
      parts.push('缓存 ' + cacheHit.toFixed(1) + '%');
    }
  } else if (startupCost.cache_hit && startupCost.cache_hit > 0) {
    parts.push('缓存 ' + startupCost.cache_hit.toFixed(1) + '%');
  }

  // Cumulative total
  var cumulativeTotal = 0;
  if (keys.length > 0) {
    var last = turnTokens[keys[keys.length - 1]];
    cumulativeTotal = last.cumulative_total || 0;
  }
  if (!cumulativeTotal) {
    cumulativeTotal = (window.STATE && window.STATE.totalTokens) ? window.STATE.totalTokens : 0;
  }
  if (cumulativeTotal > 0) {
    parts.push('累计 ' + formatNum(cumulativeTotal));
  }
  el.textContent = parts.length > 0 ? 'Token: ' + parts.join(' | ') : 'Token: —';
}

function formatNum(n) {
  if (n >= 1000) return (n / 1000).toFixed(1) + 'k';
  return String(n);
}

// The beautify/status panel is built server-side in handler.py
// (window.BEAUTIFY_HTML) and rendered in #beautify-container.

function renderBeautify() {
  // Beautify dashboard is rendered server-side in the inline panel.
  // The sidebar card is hidden; client-side rendering is no longer used.
  var card = document.getElementById('beautify-card');
  if (card) card.style.display = 'none';
}

function zoomPortrait(url) {
  var modal = document.getElementById('beautify-modal');
  var img = document.getElementById('beautify-modal-img');
  if (!modal || !img || !url) return;
  img.src = url;
  modal.style.display = 'flex';
}

function escHtml(s) {
  if (!s) return '';
  return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function setMobileSettingsOpen(open) {
  var btn = document.getElementById('mobile-settings-toggle');
  document.body.classList.toggle('mobile-settings-open', !!open);
  if (btn) {
    btn.setAttribute('aria-expanded', open ? 'true' : 'false');
    btn.classList.toggle('is-open', !!open);
  }
}

function initMobileSettingsToggle() {
  var btn = document.getElementById('mobile-settings-toggle');
  if (!btn) return;
  btn.addEventListener('click', function() {
    setMobileSettingsOpen(!document.body.classList.contains('mobile-settings-open'));
  });
  window.addEventListener('resize', function() {
    if (window.innerWidth > 720) setMobileSettingsOpen(false);
  });
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') setMobileSettingsOpen(false);
  });
}

// ═══ Dark Mode Toggle ═══
(function() {
  var saved = localStorage.getItem('theme');
  if (saved === 'dark') {
    document.documentElement.setAttribute('data-theme', 'dark');
    document.getElementById('theme-toggle').textContent = '☀️';
  }
  document.getElementById('theme-toggle').addEventListener('click', function() {
    var isDark = document.documentElement.getAttribute('data-theme') === 'dark';
    if (isDark) {
      document.documentElement.removeAttribute('data-theme');
      this.textContent = '🌙';
      localStorage.setItem('theme', 'light');
    } else {
      document.documentElement.setAttribute('data-theme', 'dark');
      this.textContent = '☀️';
      localStorage.setItem('theme', 'dark');
    }
    // Re-check word count colors for current theme
    if (typeof updateWordCount === 'function') updateWordCount();
    if (typeof updateTokenCount === 'function') updateTokenCount();
  });
})();
